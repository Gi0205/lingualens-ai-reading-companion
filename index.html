<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LinguaLens AI Reading Companion</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">L</div>
          <div>
            <h1>LinguaLens</h1>
            <p>AI Reading Companion</p>
          </div>
        </div>

        <div class="toolbar" aria-label="Reader controls">
          <label class="file-button">
            <input id="fileInput" type="file" accept=".txt,.md,.markdown,.html,.pdf,application/pdf" />
            <span data-i18n="upload">Upload</span>
          </label>
          <button id="sampleButton" type="button" data-i18n="sample">Sample</button>
          <button id="resetBookButton" type="button" data-i18n="resetBook">Reset Book</button>
          <label class="compact-control">
            <span data-i18n="fontSize">Font</span>
            <input id="fontSize" type="range" min="16" max="24" value="18" />
          </label>
          <label class="compact-control">
            <span data-i18n="autoExplain">Auto explain</span>
            <input id="autoExplain" type="checkbox" />
          </label>
        </div>
      </header>

      <section id="controlStrip" class="control-strip" aria-label="Reading and AI controls">
        <div class="control-strip-header">
          <span data-i18n="readingControls">Reading controls</span>
          <button id="toggleControlsButton" type="button" aria-controls="controlBody" aria-expanded="true">Hide controls</button>
        </div>

        <div id="controlBody" class="control-body">
          <div class="control-grid">
            <label class="control-field">
              <span data-i18n="provider">Provider</span>
              <select id="providerSelect">
                <option value="deepseek">DeepSeek</option>
                <option value="openai">OpenAI</option>
              </select>
            </label>
            <label class="control-field model-field">
              <span data-i18n="model">Model</span>
              <input id="modelInput" type="text" value="deepseek-v4-flash" spellcheck="false" />
            </label>
            <label class="control-field">
              <span data-i18n="uiLanguage">UI language</span>
              <select id="uiLanguageSelect">
                <option value="zh-CN">Chinese</option>
                <option value="ja">Japanese</option>
                <option value="en">English</option>
              </select>
            </label>
            <label class="control-field">
              <span data-i18n="outputLanguage">Explanation language</span>
              <select id="languageSelect">
                <option value="zh-CN">Chinese</option>
                <option value="ja">Japanese</option>
                <option value="en">English</option>
              </select>
            </label>
            <label class="control-field">
              <span data-i18n="saveMode">Save mode</span>
              <select id="noteSaveMode">
                <option value="quote" data-i18n="saveQuote">Quote only</option>
                <option value="quote-ai" data-i18n="saveQuoteAi">Quote + AI</option>
              </select>
            </label>
            <label id="accessCodeRow" class="control-field access-row hidden">
              <span id="accessCodeLabel">Access code</span>
              <input id="accessCodeInput" type="password" placeholder="For online demo" autocomplete="off" />
            </label>
          </div>

          <div class="selection-toolbar" aria-live="polite">
            <div class="selection-preview">
              <div class="selection-preview-header">
                <span data-i18n="currentSelection">Current selection</span>
                <button id="clearSelection" type="button" data-i18n="clear">Clear</button>
              </div>
              <p id="selectedText" class="selected-text">No text selected yet.</p>
            </div>

            <div class="quick-actions">
              <button id="explainButton" type="button" data-i18n="explain">Explain</button>
              <button id="translateButton" type="button" data-i18n="translate">Translate</button>
              <button id="summarizeButton" type="button" data-i18n="summarizeContext">Summarize context</button>
              <button id="fullSummaryButton" type="button" data-i18n="summarizeBook">Summarize book</button>
              <button id="highlightButton" type="button" data-i18n="highlight">Highlight</button>
              <button id="saveNoteButton" type="button" data-i18n="save">Save</button>
            </div>

            <div class="panel-actions" aria-label="Workspace actions">
              <button id="clearChatButton" type="button" data-i18n="clearChat">Clear chat</button>
              <button id="clearNotesButton" type="button" data-i18n="clearNotes">Clear notes</button>
              <button id="exportNotesButton" type="button" data-i18n="exportNotes">Export MD</button>
              <button id="exportDocxButton" type="button" data-i18n="exportDocx">Export DOCX</button>
            </div>
          </div>
        </div>
      </section>

      <main class="workspace">
        <section class="reader-panel" aria-labelledby="readerTitle">
          <div class="reader-header">
            <div>
              <p class="eyebrow">Reader</p>
              <h2 id="readerTitle">No book selected</h2>
            </div>
            <div class="reader-stats">
              <span id="wordCount">0 chars</span>
              <span id="noteCount">0 notes</span>
              <span id="highlightCount">0 highlights</span>
              <span id="progressCount">0%</span>
            </div>
          </div>

          <article id="reader" class="reader" tabindex="0">
            <div class="empty-state">
              <p data-i18n="emptyReader">Upload a .txt / .md file, or open the sample text to start reading.</p>
            </div>
          </article>
        </section>

        <aside class="ai-panel" aria-label="AI chat panel">
          <div class="ai-header">
            <div>
              <p class="eyebrow">AI Coach</p>
              <h2 data-i18n="aiPanelTitle">Explanation & Chat</h2>
            </div>
            <div id="apiStatus" class="status-pill" data-i18n="checking">Checking</div>
          </div>

          <div class="tabs" role="tablist" aria-label="AI panel tabs">
            <button id="chatTab" class="tab active" type="button" role="tab" aria-selected="true" data-i18n="chat">Chat</button>
            <button id="notesTab" class="tab" type="button" role="tab" aria-selected="false" data-i18n="notes">Notes</button>
          </div>

          <section id="chatView" class="chat-view" role="tabpanel" aria-labelledby="chatTab">
            <div id="messages" class="messages" aria-live="polite"></div>
            <form id="chatForm" class="chat-form">
              <textarea
                id="chatInput"
                rows="3"
                placeholder="Ask about the selected text, chapter ideas, or term meaning"
                data-i18n-placeholder="chatPlaceholder"
              ></textarea>
              <button id="sendButton" type="submit" data-i18n="send">Send</button>
            </form>
          </section>

          <section id="notesView" class="notes-view hidden" role="tabpanel" aria-labelledby="notesTab">
            <div id="notesList" class="notes-list"></div>
          </section>
        </aside>
      </main>
    </div>

    <div id="selectionMenu" class="selection-menu hidden" role="menu">
      <button id="menuExplain" type="button" role="menuitem" data-i18n="explain">Explain</button>
      <button id="menuTranslate" type="button" role="menuitem" data-i18n="translate">Translate</button>
      <button id="menuHighlight" type="button" role="menuitem" data-i18n="highlight">Highlight</button>
      <button id="menuSave" type="button" role="menuitem" data-i18n="save">Save</button>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
